[test]
# 10s default; OAuth/JWT tests can extend per-file with `timeout(15_000)` if needed.
timeout = 10000

# ─────────────────────────────────────────────────────────────────────────────
# Coverage
# ─────────────────────────────────────────────────────────────────────────────
# Bun's `coverageThreshold` is checked PER FILE. With Comprehensive-tier scope,
# OAuth-flow internals (`packages/auth/src/oauth/{flow,refresh,cimd,
# endpoints,input-parsers}.ts` and `transport-http/src/{oauth-server,
# routes/oauth,workers/routes-oauth}.ts`) are deliberately at 1-15% coverage —
# full code-grant simulation is Exhaustive-tier work. A single per-file
# threshold above ~5% would break those.
#
# So we disable the per-file gate and rely on the workspace-average reported
# in the table. Current baseline:
#   - 155 tests pass / 0 fail
#   - 72.49% lines workspace-wide
#   - 70.65% functions workspace-wide
# CI should run `bun test --coverage` and parse the "All files" line; a
# regression workflow can fail the build below 70% lines or 65% functions.
coverage = true
coverageThreshold = 0
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
